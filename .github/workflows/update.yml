name: 映画スケジュールの自動更新

on:
  # 1. 毎日日本時間の深夜0時（UTCの15時）に自動実行
  schedule:
    - cron: '0 15 * * *'
  # 2. 手動で今すぐ実行するためのボタンを表示
  workflow_dispatch:

# リポジトリの中身を上書き保存するための権限設定
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest # GitHubが用意する無料のLinuxサーバーを使います

    steps:
      #リポジトリのコードをサーバーに持ってくる
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      #サーバーにPythonをインストールする
      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      #必要なライブラリ（requests, bs4）をインストールする
      - name: ライブラリのインストール
        run: pip install -r requirements.txt

      #スクレイピングを実行する
      - name: Pythonスクリプトの実行
        run: python scraper.py

      #取得した movies.json をGitHubに上書き保存（Commit & Push）する
      - name: 変更をコミットしてプッシュ
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add *.json
          # 変更（新しい映画）があった場合のみコミットする
          git diff --quiet && git diff --staged --quiet || git commit -m "映画スケジュールを自動更新しました"
          git push
